<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>La Bàn Pro</title>
  
  <link rel="apple-touch-icon" href="icon-app.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #d4af37; --dark-gold: #aa8222; --bg: #030303; --card: #121212; 
      --text: #e8e8e8; --good: #2ecc71; --bad: #e74c3c; --border: #2c2c31;
    }
    body {
      /* Sử dụng phông Inter đồng bộ trên mọi thiết bị */
      font-family: 'Inter', sans-serif;
      background-color: var(--bg); color: var(--text);
      margin: 0; padding: env(safe-area-inset-top) 20px 80px; 
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    .header { margin: 30px 0 25px; text-align: center; }
    h1 { 
      font-size: 26px; font-weight: 800; letter-spacing: 2px; 
      color: var(--gold); text-transform: uppercase; margin-bottom: 5px;
    }
    .subtitle { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 3px; font-weight: 600;}

    /* Inputs */
    .input-section {
      background: var(--card); padding: 22px; border-radius: 20px;
      border: 1px solid var(--border); margin-bottom: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
    }
    .row { display: flex; gap: 12px; margin-bottom: 18px; }
    input, select {
      flex: 1; background: #000; border: 1px solid var(--border); color: #fff;
      padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; outline: none;
      text-align: center; font-family: 'Inter', sans-serif;
    }
    .btn-main {
      background: linear-gradient(135deg, var(--gold), var(--dark-gold));
      color: #000; font-weight: 800; padding: 18px; border-radius: 12px;
      border: none; width: 100%; font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
      font-family: 'Inter', sans-serif; cursor: pointer; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
    }
    .btn-main:active { transform: scale(0.98); }
    .btn-secondary {
      background: #111; color: var(--gold); border: 1px solid var(--gold);
      margin-top: 15px; box-shadow: none;
    }

    /* La Bàn & La Kinh */
    #compass-wrapper { position: relative; width: 320px; height: 320px; margin: 40px auto; }
    #compass-container {
      width: 100%; height: 100%; border-radius: 50%;
      border: 3px solid var(--gold); padding: 5px; box-sizing: border-box;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
      background: #000; position: relative; overflow: hidden;
    }
    #compass-face {
      width: 100%; height: 100%; border-radius: 50%;
      /* SỬ DỤNG MẶT LA KINH CỦA ANH MINH ĐỂ XOAY */
      background: url('lakinh.png') no-repeat center;
      background-size: cover; 
      transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* Xoay mượt */
      position: absolute; top: 0; left: 0;
      filter: sepia(0.6) hue-rotate(5deg) brightness(1.2) contrast(1.2);
    }
    #pointer {
      position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 10px solid transparent; border-right: 10px solid transparent;
      border-bottom: 50px solid var(--bad); /* Kim tam giác đỏ nhọn chuyên nghiệp */
      z-index: 10; filter: drop-shadow(0 0 10px rgba(231,76,60,0.9));
    }
    #degree-info { 
      font-size: 42px; font-weight: 800; text-align: center; 
      margin-top: 20px; color: #fff; font-variant-numeric: tabular-nums;
    }
    #direction-text { font-size: 18px; color: var(--gold); text-align: center; font-weight: 700; margin-top: 5px; letter-spacing: 1px;}

    /* Deep Results UI */
    #result-panel { display: none; margin-top: 40px; animation: slideUp 0.6s ease; padding-bottom: 50px; }
    .card-result { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 22px; margin-bottom: 20px; }
    .title-badge { font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 15px; display: block; text-align: center; }
    
    .profile-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 18px; }
    .cung-name-with-element { font-size: 22px; color: #fff; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .element-icon { font-size: 18px; opacity: 0.9; }
    .menh-name { font-size: 15px; color: var(--gold); font-weight: 600; }
    
    .section-title { font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text); margin-bottom: 15px; margin-top: 25px; }
    
    .directions-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .dir-item { background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid var(--good); }
    .dir-item.bad { border-left-color: var(--bad); }
    .dir-header { font-weight: 700; font-size: 15px; color: #fff; display: flex; justify-content: space-between; margin-bottom: 6px; }
    .dir-desc { font-size: 14px; color: #aaa; line-height: 1.5; }
    
    .color-section { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .color-dot { padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; background: #111; color: #fff; border: 1px solid #333;}
    .colors-label { font-size: 14px; color: #888; margin-bottom: 8px; font-weight: 500;}

    /* Watermark Footer Đẳng Cấp */
    .watermark-footer {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background-color: rgba(5, 5, 5, 0.95); color: #888; 
      text-align: center; padding: 14px; font-size: 12px;
      border-top: 1px solid var(--border);
      z-index: 999; letter-spacing: 2px; font-weight: 600;
      text-transform: uppercase; backdrop-filter: blur(8px);
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

    <button class="btn-main" onclick="runExpertAnalysis()">PHÂN TÍCH CHUYÊN SÂU</button>

  <div id="degree-info">--°</div>
