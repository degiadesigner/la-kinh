<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>La Bàn Pro</title>
  
  <link rel="apple-touch-icon" href="icon-app.png">
  <link rel="icon" type="image/png" href="icon-app.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d4af37; --dark-gold: #aa8222; --bg: #030303; --card: #121212; 
      --text: #e8e8e8; --good: #2ecc71; --bad: #e74c3c; --border: #2c2c31;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg); color: var(--text);
      padding: env(safe-area-inset-top) 15px 80px 15px;
      width: 100vw; min-height: 100vh; overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
    }

    .header { text-align: center; margin-bottom: 25px; width: 100%; margin-top: 10px;}
    h1 { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
    .subtitle { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 3px; font-weight: 600;}

    /* Ô NHẬP LIỆU CHUẨN TRỤC */
    .input-section {
      background: var(--card); padding: 20px; border-radius: 20px;
      border: 1px solid var(--border); margin-bottom: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8); width: 100%; max-width: 380px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; width: 100%; }
    input, select {
      width: 100%; min-width: 0; background: #000; border: 1px solid var(--border); color: #fff;
      padding: 15px 10px; border-radius: 12px; font-size: 16px; font-weight: 600; outline: none;
      text-align: center; font-family: 'Inter', sans-serif; appearance: none;
    }
    .btn-main {
      background: linear-gradient(135deg, var(--gold), var(--dark-gold));
      color: #000; font-weight: 800; padding: 16px; border-radius: 12px;
      border: none; width: 100%; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
      font-family: 'Inter', sans-serif; cursor: pointer;
    }

    /* VÒNG LA BÀN */
    #compass-wrapper { position: relative; width: 100%; max-width: 330px; aspect-ratio: 1/1; margin: 30px auto 10px; }
    
    /* MÀN HÌNH CHỜ - SẼ BIẾN MẤT KHI CHẠM */
    #calibration-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); border-radius: 50%; z-index: 99;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2px dashed var(--gold); cursor: pointer; transition: opacity 0.3s ease;
    }
    .pulse-dot { width: 30px; height: 30px; background: var(--gold); border-radius: 50%; margin-bottom: 10px; animation: pulse 1.5s infinite; }
    .calibration-text { color: var(--gold); font-size: 12px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    @keyframes pulse { 0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); } 100% { transform: scale(0.9); } }

    #compass-container {
      width: 100%; height: 100%; border-radius: 50%;
      border: 3px solid var(--gold); position: relative; overflow: hidden; background: #000;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
    }
    #compass-face {
      width: 100%; height: 100%; border-radius: 50%;
      /* ÉP IPHONE TẢI ẢNH MỚI NHẤT CỦA ANH MINH */
      background: url('lakinh.png?v=final_pro') no-repeat center;
      background-size: contain; 
      transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
      position: absolute; top: 0; left: 0;
    }
    #pointer {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent;
      border-bottom: 55px solid var(--bad); z-index: 10; filter: drop-shadow(0 0 8px rgba(231,76,60,0.9));
    }
    #degree-info { font-size: 46px; font-weight: 800; text-align: center; margin-top: 5px; color: #fff; }
    #direction-text { font-size: 18px; color: var(--gold); text-align: center; font-weight: 700; margin-top: 5px; letter-spacing: 1px; margin-bottom: 20px;}

    /* BẢNG KẾT QUẢ */
    #result-panel { display: none; width: 100%; max-width: 400px; padding-bottom: 40px; animation: slideUp 0.5s ease;}
    .card-result { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 22px; width: 100%; }
    .title-badge { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 15px; display: block; text-align: center; }
    .profile-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .cung-name { font-size: 22px; color: #fff; font-weight: 800; }
    .menh-name { font-size: 15px; color: var(--gold); font-weight: 600; }
    .dir-item { background: #000; padding: 12px; border-radius: 12px; border-left: 4px solid var(--good); margin-bottom: 10px;}
    .dir-item.bad { border-left-color: var(--bad); }
    .dir-header { font-weight: 700; font-size: 14px; color: #fff; display: flex; justify-content: space-between; }
    .dir-desc { font-size: 13px; color: #aaa; margin-top: 4px; }
    .color-dot { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #111; color: #fff; border: 1px solid #333; display: inline-block; margin-right: 5px; margin-top: 5px;}

    .watermark-footer {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background-color: rgba(5, 5, 5, 0.9); color: #777; 
      text-align: center; padding: 15px; font-size: 11px;
      border-top: 1px solid var(--border); z-index: 999; letter-spacing: 1px; font-weight: 600;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

    <div class="subtitle">Architectural Feng Shui Master</div>
    <h1>LA BÀN PRO</h1>
  </div>

  <div class="input-section">

      <input type="number" id="birthYear" value="1991" pattern="\d*">

      </select>
    </div>
    <button class="btn-main" onclick="runExpertAnalysis()">PHÂN TÍCH CHUYÊN SÂU</button>
  </div>

  <div id="degree-info">--°</div>
  <div id="direction-text">Chạm để bắt đầu</div>

    <div id="pointer"></div>

  <div id="result-panel"></div>

  <footer class="watermark-footer">
