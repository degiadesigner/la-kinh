<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>La Bàn Pro</title>
  
  <link rel="apple-touch-icon" href="icon-app.png">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* 1. KHÓA KHUNG CHỐNG LỆCH TUYỆT ĐỐI */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: #050505; 
      color: #e8e8e8; 
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      width: 100%;
      overflow-x: hidden; /* Cấm trượt ngang */
    }

    /* Chiếc hộp này khóa mọi thứ ở chính giữa màn hình */
    .app-container {
      max-width: 430px; /* Chiều rộng chuẩn của iPhone Max */
      margin: 0 auto; /* Tự động căn giữa 2 bên */
      padding: calc(env(safe-area-inset-top) + 20px) 20px 100px 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 2. THẨM MỸ GIAO DIỆN */
    .header { text-align: center; margin-bottom: 25px; width: 100%; }
    h1 { color: #d4af37; font-size: 26px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .subtitle { color: #888; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }

    /* Form Nhập Liệu */
    .input-box { background: #121212; border: 1px solid #2c2c31; border-radius: 20px; padding: 20px; width: 100%; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .flex-row { display: flex; gap: 15px; margin-bottom: 15px; width: 100%; }
    .flex-row input, .flex-row select { flex: 1; width: 50%; background: #000; border: 1px solid #2c2c31; color: #fff; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; text-align: center; outline: none; font-family: 'Inter', sans-serif; }
    
    .btn-gold { background: linear-gradient(135deg, #d4af37, #aa8222); color: #000; border: none; border-radius: 12px; padding: 18px; width: 100%; font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-family: 'Inter', sans-serif; box-shadow: 0 5px 15px rgba(212,175,55,0.2); cursor: pointer; display: block; text-align: center;}
    .btn-gold:active { transform: scale(0.98); }
    .btn-outline { background: transparent; color: #d4af37; border: 1px solid #d4af37; box-shadow: none; margin-bottom: 15px;}

    /* 3. KHU VỰC LA BÀN CHUẨN XÁC */
    .status-area { text-align: center; width: 100%; min-height: 85px; margin-bottom: 10px;}
    .deg-text { font-size: 46px; font-weight: 800; color: #fff; display: none; line-height: 1; margin-bottom: 5px;}
    .dir-text { font-size: 18px; font-weight: 700; color: #d4af37; letter-spacing: 1px; display: none; }

    /* Khung La Bàn: Ép tỷ lệ 1:1 vuông vức, không méo */
    .compass-box { width: 100%; max-width: 340px; aspect-ratio: 1 / 1; position: relative; margin: 0 auto 30px; }
    .compass-ring { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #d4af37; padding: 5px; background: #000; position: relative; box-shadow: 0 0 30px rgba(212,175,55,0.15), inset 0 0 20px #000; }
    
    /* Mặt La Kinh: Neo tâm chống lắc lư */
    .compass-face { 
      width: 100%; height: 100%; border-radius: 50%;
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Luopan.jpg/1024px-Luopan.jpg');
      background-size: contain; /* Ép hình ảnh vừa khít vòng tròn */
      background-position: center center;
      background-repeat: no-repeat;
      position: absolute; top: 0; left: 0;
      transform-origin: center center; /* KHÓA TÂM: Chống lắc xéo khi xoay */
      transition: transform 0.1s linear;
      filter: sepia(0.2) brightness(1.1);
    }
    
    /* Kim đỏ */
    .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 40px solid #e74c3c; z-index: 10; filter: drop-shadow(0 0 8px rgba(231,76,60,0.8)); }

    /* 4. KẾT QUẢ PHÂN TÍCH */
    .result-box { display: none; background: #121212; border: 1px solid #2c2c31; border-radius: 20px; padding: 20px; width: 100%; margin-top: 10px; animation: fadeIn 0.5s ease; }
    .badge { font-size: 12px; color: #d4af37; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; text-align: center; display: block; margin-bottom: 15px; }
    .row-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2c2c31; padding-bottom: 15px; margin-bottom: 15px; }
    .val-cung { font-size: 20px; font-weight: 800; color: #fff; }
    .val-menh { font-size: 15px; font-weight: 600; color: #d4af37; }
    
    .sec-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .item-dir { background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid #2ecc71; }
    .item-dir.bad { border-left-color: #e74c3c; }
    .item-head { display: flex; justify-content: space-between; font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 5px; }
    .item-desc { font-size: 13px; color: #aaa; line-height: 1.4; }
    
    .color-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .color-tag { padding: 6px 12px; background: #000; border: 1px solid #333; border-radius: 20px; font-size: 12px; font-weight: 700; color: #fff; }

    .watermark { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,5,5,0.95); text-align: center; padding: 15px 0; border-top: 1px solid #2c2c31; color: #888; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; z-index: 100; backdrop-filter: blur(10px); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="header">
      <div class="subtitle">Architectural Feng Shui</div>
      <h1>LA BÀN PRO</h1>
    </div>

    <div class="input-box">
      <div class="flex-row">
        <input type="number" id="birthYear" placeholder="Năm sinh" value="1991" pattern="\d*">
        <select id="gender">
          <option value="nam">Nam giới</option>
          <option value="nu">Nữ giới</option>
        </select>
      </div>
      <button class="btn-gold" onclick="runAnalysis()">PHÂN TÍCH CHUYÊN SÂU</button>
    </div>

    <div class="status-area">
      <button id="btn-start" class="btn-gold btn-outline">KẾT NỐI LA KINH TỪ TÍNH</button>
      <div id="deg" class="deg-text">--°</div>
      <div id="dir" class="dir-text"></div>
    </div>

    <div class="compass-box">
      <div class="pointer"></div>
      <div class="compass-ring">
        <div id="face" class="compass-face"></div>
      </div>
    </div>

    <div id="result" class="result-box"></div>

  </div>

  <div class="watermark">MinhTT - Kiến Trúc Thanh Hòa - 0987334004</div>

  <script>
    const dataBatTrach = {
      1: { name: "Khảm (Thủy)", good: {"Đông Nam":"Sinh Khí", "Đông":"Thiên Y", "Nam":"Diên Niên", "Bắc":"Phục Vị"}, bad: {"Tây Nam":"Tuyệt Mệnh", "Đông Bắc":"Ngũ Quỷ", "Tây Bắc":"Lục Sát", "Tây":"Họa Hại"} },
      2: { name: "Khôn (Thổ)", good: {"Đông Bắc":"Sinh Khí", "Tây":"Thiên Y", "Tây Bắc":"Diên Niên", "Tây Nam":"Phục Vị"}, bad: {"Bắc":"Tuyệt Mệnh", "Đông Nam":"Ngũ Quỷ", "Nam":"Lục Sát", "Đông":"Họa Hại"} },
      3: { name: "Chấn (Mộc)", good: {"Nam":"Sinh Khí", "Bắc":"Thiên Y", "Đông Nam":"Diên Niên", "Đông":"Phục Vị"}, bad: {"Tây":"Tuyệt Mệnh", "Tây Bắc":"Ngũ Quỷ", "Đông Bắc":"Lục Sát", "Tây Nam":"Họa Hại"} },
      4: { name: "Tốn (Mộc)", good: {"Bắc":"Sinh Khí", "Nam":"Thiên Y", "Đông":"Diên Niên", "Đông Nam":"Phục Vị"}, bad: {"Đông Bắc":"Tuyệt Mệnh", "Tây Nam":"Ngũ Quỷ", "Tây":"Lục Sát", "Tây Bắc":"Họa Hại"} },
      6: { name: "Càn (Kim)", good: {"Tây":"Sinh Khí", "Đông Bắc":"Thiên Y", "Tây Nam":"Diên Niên", "Tây Bắc":"Phục Vị"}, bad: {"Nam":"Tuyệt Mệnh", "Đông":"Ngũ Quỷ", "Bắc":"Lục Sát", "Đông Nam":"Họa Hại"} },
      7: { name: "Đoài (Kim)", good: {"Tây Bắc":"Sinh Khí", "Tây Nam":"Thiên Y", "Đông Bắc":"Diên Niên", "Tây":"Phục Vị"}, bad: {"Đông":"Tuyệt Mệnh", "Nam":"Ngũ Quỷ", "Đông Nam":"Lục Sát", "Bắc":"Họa Hại"} },
      8: { name: "Cấn (Thổ)", good: {"Tây Nam":"Sinh Khí", "Tây Bắc":"Thiên Y", "Tây":"Diên Niên", "Đông Bắc":"Phục Vị"}, bad: {"Đông Nam":"Tuyệt Mệnh", "Bắc":"Ngũ Quỷ", "Đông":"Lục Sát", "Nam":"Họa Hại"} },
      9: { name: "Ly (Hỏa)", good: {"Đông":"Sinh Khí", "Đông Nam":"Thiên Y", "Bắc":"Diên Niên", "Nam":"Phục Vị"}, bad: {"Tây Bắc":"Tuyệt Mệnh", "Tây":"Ngũ Quỷ", "Tây Nam":"Lục Sát", "Đông Bắc":"Họa Hại"} }
    };
    const napAmList = [ "Hải Trung Kim", "Lư Trung Hỏa", "Đại Lâm Mộc", "Lộ Bàng Thổ", "Kiếm Phong Kim", "Sơn Đầu Hỏa", "Giản Hạ Thủy", "Thành Đầu Thổ", "Bạch Lạp Kim", "Dương Liễu Mộc", "Tuyền Trung Thủy", "Ốc Thượng Thổ", "Tích Lịch Hỏa", "Tùng Bách Mộc", "Trường Lưu Thủy", "Sa Trung Kim", "Sơn Hạ Hỏa", "Bình Địa Mộc", "Bích Thượng Thổ", "Kim Bạch Kim", "Phúc Đăng Hỏa", "Thiên Hà Thủy", "Đại Trạch Thổ", "Thoa Xuyến Kim", "Tang Đố Mộc", "Đại Khê Thủy", "Sa Trung Thổ", "Thiên Thượng Hỏa", "Thạch Lựu Mộc", "Đại Hải Thủy" ];
    
    function getColors(menh) {
      if(menh.includes("Kim")) return { g: ["Vàng", "Nâu đất", "Trắng"], b: ["Đỏ", "Hồng", "Tím"] };
      if(menh.includes("Thủy")) return { g: ["Trắng", "Xám", "Đen"], b: ["Vàng", "Nâu đất"] };
      if(menh.includes("Mộc")) return { g: ["Đen", "Xanh dương", "Xanh lá"], b: ["Trắng", "Xám"] };
      if(menh.includes("Hỏa")) return { g: ["Xanh lá", "Đỏ", "Hồng"], b: ["Đen", "Xanh dương"] };
      if(menh.includes("Thổ")) return { g: ["Đỏ", "Hồng", "Vàng"], b: ["Xanh lá cây"] };
      return { g: [], b: [] };
    }

    function runAnalysis() {
      const y = parseInt(document.getElementById('birthYear').value);
      const g = document.getElementById('gender').value;
      if (!y || y < 1900) return;
      
      let sum = 0; String(y).split('').forEach(d => sum += parseInt(d));
      while(sum > 9) { let temp = 0; String(sum).split('').forEach(d => temp += parseInt(d)); sum = temp; }
      let kua = (g === 'nam') ? (11 - sum) : (4 + sum); if (kua > 9) kua -= 9; if (kua === 5) kua = (g === 'nam') ? 2 : 8;
      
      const p = batTrachData[kua]; 
      const nap = napAmList[Math.floor((y - 1924) / 2) % 30]; 
      const col = getColors(nap);

      let h = `<span class="badge">HỒ SƠ GIA CHỦ</span><div class="row-info"><div class="val-cung">Cung ${p.name}</div><div class="val-menh">${nap}</div></div><div class="sec-title" style="color:#2ecc71">BỐN HƯỚNG CÁT:</div><div class="grid-2">`;
      for (const [dir, name] of Object.entries(p.good)) { h += `<div class="item-dir"><div class="item-head"><span>${dir}</span><span style="color:#2ecc71">${name}</span></div></div>`; }
      h += `</div><div class="sec-title" style="color:#e74c3c">BỐN HƯỚNG HUNG:</div><div class="grid-2">`;
      for (const [dir, name] of Object.entries(p.bad)) { h += `<div class="item-dir bad"><div class="item-head"><span>${dir}</span><span style="color:#e74c3c">${name}</span></div></div>`; }
      h += `</div><div class="sec-title">MÀU SẮC PHONG THỦY:</div><div style="font-size:13px; color:#aaa; margin-bottom:5px;">Nên dùng:</div><div class="color-wrap">`;
      col.g.forEach(c => h += `<div class="color-tag" style="color:#2ecc71; border-color:#2ecc71">${c}</div>`);
      h += `</div><div style="font-size:13px; color:#aaa; margin:10px 0 5px;">Đại kỵ:</div><div class="color-wrap">`;
      col.b.forEach(c => h += `<div class="color-tag" style="color:#e74c3c; border-color:#e74c3c">${c}</div>`);
      
      const box = document.getElementById('result'); box.innerHTML = h + `</div>`; box.style.display = 'block';
      setTimeout(() => box.scrollIntoView({ behavior: 'smooth' }), 100);
    }

    const face = document.getElementById('face');
    const degEl = document.getElementById('deg');
    const dirEl = document.getElementById('dir');
    const btn = document.getElementById('btn-start');

    function getDirName(d) {
      const arr = ["Bắc","Đông Bắc","Đông","Đông Nam","Nam","Tây Nam","Tây","Tây Bắc"];
      return "Chính " + arr[Math.round(d / 45) % 8];
    }

    btn.onclick = function() {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(s => {
          if (s === 'granted') { window.addEventListener('deviceorientation', handleOrient); activate(); }
        }).catch(console.error);
      } else { window.addEventListener('deviceorientationabsolute', handleOrient); activate(); }
    };

    function activate() { btn.style.display = 'none'; degEl.style.display = 'block'; dirEl.style.display = 'block'; }

    function handleOrient(e) {
      let h = e.webkitCompassHeading; 
      if (h != null) {
        requestAnimationFrame(() => {
          face.style.transform = `rotate(${-h}deg)`; 
          let r = Math.round(h); degEl.innerText = r + "°"; dirEl.innerText = getDirName(r);
        });
      }
    }
  </script>
</body>
</html>
